<!DOCTYPE html>
<html>
  <head>
    <title>Kids Retreat 2026 Check-In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="dns-prefetch" href="//script.google.com">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//cdn.datatables.net">
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.datatables.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <style>
      @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }
      #checkInModalMessage {
        text-align: center
      }
      .non-veg {
        color: red;
        font-weight: bold;
      }
      .veg {
        color: green;
        font-weight: bold;
        animation: blink 1s infinite;
      }
      .loader {
        border: 16px solid #f3f3f3;
        border-radius: 50%;
        border-top: 16px solid blue;
        width: 60px;
        height: 60px;
        animation: spin 2s linear infinite;
      }
      .backdrop {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none;
        align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .header {
        display: flex;
      }
      .header-title {
        flex-grow: 2;
      }
      .input-group {
      position: relative;
      margin-top: 10px
    }

    .toggle-btn {

      border: 1px solid #ced4da;



      cursor: pointer;
      color: #6c757d;
    }
    .paid {
      background-color: #d4edda;
      color: #155724;
    }
    .not-paid {
      background-color: #f8d7da;
      color: #721c24;
    }

    .search-result-card {
      border: 1px solid #e6ebf2;
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(14, 30, 62, 0.08);
      overflow: hidden;
    }

    .search-result-card .card-body {
      padding: 1rem;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
    }

    .search-result-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .search-result-role {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.35rem;
    }

    .search-result-name {
      color: #14213d;
    }

    .search-result-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #eef4ff;
      color: #24447b;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .food-preference-pill.veg {
      background: #e3f7e8;
      color: #1f6b37;
      animation: none;
    }

    .food-preference-pill.non-veg {
      background: #fde8e6;
      color: #a33a2d;
    }

    .search-result-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 120px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 110px;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-paid {
      background: #dff3e4;
      color: #18603a;
    }

    .status-pending {
      background: #fff0d8;
      color: #8a4b08;
    }

    .status-caption {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #6b7280;
    }

    .search-result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .detail-item {
      padding: 0.8rem 0.9rem;
      border-radius: 14px;
      background: #f7f9fc;
      border: 1px solid #edf1f7;
    }

    .detail-item-wide {
      grid-column: 1 / -1;
    }

    .detail-label {
      display: block;
      font-size: 0.76rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .detail-value {
      display: block;
      color: #1f2937;
      font-weight: 600;
      word-break: break-word;
    }

    .detail-inline-pair {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
    }

    .detail-inline-block {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
      flex: 1 1 220px;
    }

    .detail-inline-key {
      font-size: 0.78rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .payment-mode-panel {
      padding: 0.95rem 1rem;
      border-radius: 16px;
      background: #f4f8ff;
      border: 1px solid #dde8fb;
      margin-bottom: 1rem;
    }

    .payment-choice-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .payment-choice-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .payment-choice {
      min-width: 120px;
      padding: 0.65rem 0.9rem;
      border-radius: 12px;
      border: 1px solid #bfd2f4;
      background: #ffffff;
      color: #24447b;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .payment-choice-input:checked + .payment-choice {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(31, 111, 235, 0.22);
    }

    .payment-choice-input:disabled + .payment-choice {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .payment-choice-input:checked:disabled + .payment-choice {
      opacity: 1;
      background: #1f6feb;
      border-color: #1f6feb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(31, 111, 235, 0.18);
    }

    .search-result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .search-result-actions .btn {
      min-width: 150px;
      border-radius: 12px;
      font-weight: 600;
    }

    @media (min-width: 768px) {
      .search-result-card .card-body {
        padding: 1.25rem;
      }

      .search-result-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.8rem;
      }
    }

    @media (max-width: 576px) {
      .search-result-top {
        flex-direction: column;
      }

      .search-result-status {
        align-items: flex-start;
      }

      .search-result-actions .btn,
      .payment-choice {
        width: 100%;
      }

      .detail-inline-pair {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .detail-inline-block {
        width: 100%;
      }
    }


    .toggle-btn:hover {
      color: #495057;
    }
    </style>

  </head>
  <body>
    <div class="container">
      <!-- Tabs -->
      <ul class="nav nav-tabs mt-3" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="checkin-tab" data-bs-toggle="tab" data-bs-target="#checkin" type="button" role="tab" aria-controls="checkin" aria-selected="true">CheckIn</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="report-tab" data-bs-toggle="tab" data-bs-target="#report" type="button" role="tab" aria-controls="report" aria-selected="false" onclick="listStudents()">Report</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summary" type="button" role="tab" aria-controls="summary" aria-selected="false" onclick="checkedInSummary()">Summary</button>
        </li>
      </ul>
      <input type="hidden" id="accessToken" class="form-control">
      <div class="tab-content" id="mainTabsContent">
        <div class="tab-pane fade show active" id="checkin" role="tabpanel" aria-labelledby="checkin-tab">


      <!-- Bootstrap Modal -->
      <div class="modal fade" id="checkInModal" tabindex="-1" aria-labelledby="checkInModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="checkInModalLabel">Check-In Status</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="checkInModalMessage">
              <!-- Success or failure message will appear here -->
            </div>
            <div class="modal-footer">

              <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
            </div>
          </div>
        </div>
      </div>

      <div class="header d-flex align-items-center justify-content-between bg-light shadow-sm p-3">
        <!-- Left Section -->
        <div class="header-left">
          <h1 class="header-title m-0">Kids Retreat  2026 Check-In</h1>
        </div>

        <!-- Right Section -->
        <div class="header-right d-flex align-items-center">
          <!-- User Profile -->
          <div id="profile" class="d-flex align-items-center me-3">

          </div>

          <!-- Logout Button -->
          <button id="logout" type="button" class="btn btn-outline-secondary d-flex align-items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-box-arrow-right me-2" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"></path>
              <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"></path>
            </svg>
            Log Out
          </button>
        </div>
      </div>



      <div class="row align-items-center">
        <div class="col-sm-1">
          <label>Search By </label>
        </div>
        <div class="col-sm">
          <div class="btn-group" role="group" aria-label="Toggle Input Type">
            <input
              type="radio"
              class="btn-check"
              name="inputTypeToggle"
              id="radioText"
              autocomplete="off"
              onchange="setInputType('text')">
            <label class="btn btn-outline-primary" for="radioText">Name</label>

            <input
              type="radio"
              class="btn-check"
              name="inputTypeToggle"
              id="radioTel"
              autocomplete="off"
              onchange="setInputType('tel')"
              checked>
            <label class="btn btn-outline-primary" for="radioTel">Reg No/Mobile No</label>
          </div>
        </div>

        <div class="input-group">
          <input type="tel" id="searchInput" class="form-control" placeholder="Enter Parent Mobile No or Reg Ref No">
          <button class="toggle-btn"  onclick="toggleKeyboardType()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-keyboard" viewBox="0 0 16 16">
              <path d="M14 5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zM2 4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <path d="M13 10.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm0-2a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm-5 0A.25.25 0 0 1 8.25 8h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 8 8.75zm2 0a.25.25 0 0 1 .25-.25h1.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-1.5a.25.25 0 0 1-.25-.25zm1 2a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm-5-2A.25.25 0 0 1 6.25 8h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 6 8.75zm-2 0A.25.25 0 0 1 4.25 8h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 4 8.75zm-2 0A.25.25 0 0 1 2.25 8h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 2 8.75zm11-2a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm-2 0a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm-2 0A.25.25 0 0 1 9.25 6h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 9 6.75zm-2 0A.25.25 0 0 1 7.25 6h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 7 6.75zm-2 0A.25.25 0 0 1 5.25 6h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5A.25.25 0 0 1 5 6.75zm-3 0A.25.25 0 0 1 2.25 6h1.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-1.5A.25.25 0 0 1 2 6.75zm0 4a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zm2 0a.25.25 0 0 1 .25-.25h5.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-5.5a.25.25 0 0 1-.25-.25z"/>
            </svg>
          </button>
        </div>
      </div>

      <button id="searchBtn" class="btn btn-primary mt-2" onclick="fetchStudentDetails()">Search</button>
      <div id="details"></div>
        </div>
        <div class="tab-pane fade" id="report" role="tabpanel" aria-labelledby="report-tab">
          <div class="d-flex justify-content-between align-items-center mt-3">
            <p id="reportUpdatedAt" class="small text-muted mb-0">Last updated: -</p>
            <button class="btn btn-sm btn-outline-secondary" onclick="listStudents(true)">Refresh</button>
          </div>
          <p id="reportStatus" class="small mb-2"></p>
          <div id="reportTable" class="mt-4"></div>
        </div>
        <div class="tab-pane fade" id="summary" role="tabpanel" aria-labelledby="summary-tab">
          <div id="summaryContent" class="mt-4">
            <div class="card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h3 class="card-title mb-0">Payment Summary</h3>
                  <button class="btn btn-sm btn-outline-secondary" onclick="checkedInSummary(true)">Refresh</button>
                </div>
                <p id="summaryUpdatedAt" class="small text-muted mb-2">Last updated: -</p>
                <p id="summaryStatus" class="small mb-2"></p>
                <div class="row">
                  <div class="col-md-4">
                    <div class="card bg-light">
                      <div class="card-body">
                        <h5 class="card-title">Total UPI</h5>
                        <p class="card-text h3" id="totalUPI"> 0</p>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="card bg-light">
                      <div class="card-body">
                        <h5 class="card-title">Total Cash</h5>
                        <p class="card-text h3" id="totalCash">0</p>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="card bg-light">
                      <div class="card-body">
                        <h5 class="card-title">Total Amount</h5>
                        <p class="card-text h3" id="totalAmount">0</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="backdrop" class="backdrop">

      <div class="loader"></div>
    </div>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script defer src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script defer src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script defer src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script defer src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script defer src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script defer src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script defer src="./main.js">
    </script>
  </body>
</html>
